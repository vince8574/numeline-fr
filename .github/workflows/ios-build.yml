name: iOS Build

on:
  workflow_dispatch:
  # Déclenchement par tag (permet de lancer le build iOS sans la CLI gh : il suffit
  # de pousser un tag « ios-build-* »). On n'utilise PAS de trigger sur push de branche
  # pour ne pas builder iOS (coûteux en minutes macOS) à chaque commit.
  push:
    tags:
      - "ios-build-*"

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          # tr -d strip le wrapping/CRLF éventuel du secret avant décodage (cf. fix .p8)
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | tr -d '[:space:]' | base64 -D > android/app/google-services.json
          node -e "JSON.parse(require('fs').readFileSync('android/app/google-services.json','utf8'))" && echo "google-services.json: valid JSON"

      - name: Create GoogleService-Info.plist
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | tr -d '[:space:]' | base64 -D > GoogleService-Info.plist
          # Une plist vide/corrompue ne fait PAS échouer le build mais crash l'app
          # au démarrage (FirebaseApp.configure). On valide donc ici.
          plutil -lint GoogleService-Info.plist
          /usr/libexec/PlistBuddy -c "Print BUNDLE_ID" GoogleService-Info.plist

      - name: Set iOS build number (auto-increment)
        run: |
          # Timestamp Unix : strictement croissant à chaque run (même approche
          # qu'eatSafe), toujours unique → plus jamais d'erreur altool -19232
          # « bundle version already used ». Patché AVANT prebuild pour que
          # CFBundleVersion soit pris en compte.
          BUILD_NUMBER=$(date -u +%s)
          echo "iOS build number: $BUILD_NUMBER"
          node -e "const fs=require('fs');const p='./app.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.expo.ios.buildNumber=String($BUILD_NUMBER);fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');"

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Debug Podfile
        run: |
          echo "=== Podfile content ==="
          cat ios/Podfile
          echo ""
          echo "=== End of Podfile ==="

      - name: Install Pods
        run: cd ios && pod install --repo-update

      - name: Setup certificates
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 -D > $PROFILE_PATH

          echo "Certificate file size: $(wc -c < $CERTIFICATE_PATH) bytes"
          echo "Profile file size: $(wc -c < $PROFILE_PATH) bytes"
          echo "Certificate SHA256: $(shasum -a 256 $CERTIFICATE_PATH | cut -d' ' -f1)"
          echo "Certificate header (hex): $(xxd -l 16 $CERTIFICATE_PATH | head -1)"

          HEADER=$(xxd -p -l 2 $CERTIFICATE_PATH)
          if [[ "$HEADER" != "3082" && "$HEADER" != "3083" ]]; then
            echo "WARNING: Certificate does not appear to be a valid PKCS12 file"
            echo "Expected header: 3082 or 3083, got: $HEADER"
          fi

          echo "Password length: ${#DISTRIBUTION_CERTIFICATE_PASSWORD}"
          echo "Password ends with: ...${DISTRIBUTION_CERTIFICATE_PASSWORD: -4}"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "Verifying certificate with openssl..."
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$DISTRIBUTION_CERTIFICATE_PASSWORD" -noout && echo "Certificate verification: OK"

          echo "Converting certificate to macOS-compatible format..."
          CONVERTED_PATH=$RUNNER_TEMP/converted_certificate.p12

          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$DISTRIBUTION_CERTIFICATE_PASSWORD" -clcerts -nokeys -out $RUNNER_TEMP/cert.pem
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$DISTRIBUTION_CERTIFICATE_PASSWORD" -nocerts -nodes -out $RUNNER_TEMP/key.pem
          openssl pkcs12 -export -in $RUNNER_TEMP/cert.pem -inkey $RUNNER_TEMP/key.pem -out $CONVERTED_PATH -passout pass:"$DISTRIBUTION_CERTIFICATE_PASSWORD"

          echo "Converted certificate size: $(wc -c < $CONVERTED_PATH) bytes"

          security import $CONVERTED_PATH -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          echo "Provisioning Profile UUID: $PROFILE_UUID"
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Build Archive
        env:
          # Inlinée par Metro dans le bundle JS pendant la phase « Bundle React
          # Native code and images » de l'archive. Sans elle, Google Sign-In est
          # configuré avec un webClientId vide (EAS l'injectait via eas.json).
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: "577892941568-l3enpddn0gk0sljk59nf60eea67id2vu.apps.googleusercontent.com"
          NODE_ENV: production
        run: |
          set -o pipefail
          xcodebuild -workspace ios/numelineFR.xcworkspace \
            -scheme numelineFR \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/numelineFR.xcarchive \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            2>&1 | tee $RUNNER_TEMP/xcodebuild.log || {
              EXIT_CODE=$?
              echo ""
              echo "=========================================="
              echo "BUILD FAILED - Extracting error details"
              echo "=========================================="
              echo ""
              echo "::group::Compilation Errors"
              grep -A 3 "error:" $RUNNER_TEMP/xcodebuild.log | head -100 || echo "No error patterns found"
              echo "::endgroup::"
              echo ""
              echo "::group::Last 100 lines of build log"
              tail -100 $RUNNER_TEMP/xcodebuild.log
              echo "::endgroup::"
              exit $EXIT_CODE
            }

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          retention-days: 7

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.numelinefr.app</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/numelineFR.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: numelineFR-iOS
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 7

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          # Le secret peut être en PEM brut OU en base64. On auto-détecte ; pour le base64
          # on retire tout espace/CRLF (wrapping, copier-coller Windows) AVANT de décoder,
          # sinon le .p8 est corrompu et altool renvoie « -39 invalid authentication key ».
          if printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_PATH"
          else
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" | tr -d '[:space:]' | base64 -D > "$KEY_PATH"
          fi
          echo "KEY_ID set: $([ -n "$APP_STORE_CONNECT_KEY_ID" ] && echo yes || echo NO)"
          echo "AuthKey size: $(wc -c < "$KEY_PATH") bytes"
          echo "First line: $(head -1 "$KEY_PATH")"

          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "Uploading IPA: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
